<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Snehith Krishnan R</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="logo">SKR</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-container">

    <div class="contact-card">
      <h2>Contact Info</h2>
      <div class="underline"></div>

      <div class="contact-item">
        <i class="fa-regular fa-envelope"></i>
        snehithkrishnan@gmail.com
      </div>

      <div class="contact-item">
        <i class="fa-brands fa-github"></i>
        <a href="https://github.com/snehithkrishnan-coder" target="_blank">
          github.com/snehithkrishnan-coder
        </a>
      </div>

    </div>

    <div class="contact-card">
      <h2>Send a Message</h2>
      <div class="underline"></div>

      <div class="form-group">
        <label class="form-label" for="name">Your Name</label>
        <input class="form-input" type="text" id="name" placeholder="e.g. John Doe" />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label class="form-label" for="subject">Subject</label>
        <input class="form-input" type="text" id="subject" placeholder="What's this about?" />
      </div>

      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" rows="5" placeholder="Your message here..."></textarea>
      </div>

      <button class="form-submit">Send Message</button>

    </div>

  </div>

  <footer>
    Built with HTML and CSS &mdash; Snehith Krishnan R
  </footer>

</body>
</html>
